<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #eff6ff 0%, #faf5ff 100%);
    width: 1200px; height: 630px;
    display: flex; flex-direction: column;
    justify-content: flex-start;
    padding: 84px 90px 0;
    position: relative;
  }
  .eyebrow {
    font-size: 26px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: #7c3aed; margin-bottom: 26px;
  }
  h1 {
    font-size: 92px; font-weight: 800; line-height: 1.04;
    background: linear-gradient(90deg, #2563eb 0%, #9333ea 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent; margin-bottom: 30px; letter-spacing: -2px;
  }
  p.sub {
    font-size: 33px; color: #475569; line-height: 1.45;
    max-width: 960px;
  }
  .rule {
    position: absolute; bottom: 132px; left: 90px; right: 90px;
    height: 8px; border-radius: 999px;
    background: linear-gradient(90deg, #3b82f6 0%, #a855f7 60%, #e2e8f0 60%, #e2e8f0 100%);
  }
  .domain {
    position: absolute; bottom: 54px; left: 90px;
    font-size: 30px; font-weight: 700; color: #1e293b;
  }
  .pill {
    position: absolute; bottom: 54px; right: 90px;
    font-size: 24px; color: #64748b;
  }
</style>
</head>
<body>
  <div class="eyebrow">AI Progress Tracker</div>
  <h1>Machines of<br>Loving Grace</h1>
  <p class="sub">Tracking real-world progress toward the predictions in Dario Amodei&rsquo;s essay on the future of AI.</p>
  <div class="rule"></div>
  <div class="domain">aiprogresstracker.com</div>
  <div class="pill">Updated weekly</div>
</body>
</html>
